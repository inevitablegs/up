name: Full Repo Scan CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Create venv
      run: |
        python -m venv venv
        source venv/bin/activate

    - name: Install dependencies
      run: |
        source venv/bin/activate
        pip install --upgrade pip
        pip install requirements.txt
    
    - name: Scan entire repo (syntax check)
      run: |
        source venv/bin/activate
        python -m compileall .

    - name: Import validation
      run: |
        source venv/bin/activate
        python -c "import app.main"


